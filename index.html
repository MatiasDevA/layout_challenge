<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- displays site properly based on user's device -->

  <link rel="icon" type="image/png" sizes="32x32" href="./images/favicon-32x32.png">
  
  <title>Frontend Mentor | Product preview card component</title>
  <link rel="stylesheet" href="./style.css">
</head>
<body>
  <div class="wrapper">
      <div class="card">
        <div class="card-image">
          <img src="./images/image-product-mobile.jpg" alt="">
        </div>
        <div class="card-image-desktop">
           <img src="./images/image-product-desktop.jpg" alt="">
        </div>
    
        <div class="card-content">
          <p>Perfume</p>
          <h1>Gabrielle Essence Eau De Parfum</h1>
          <p>A floral, solar and voluptuous interpretation composed by Olivier Polge, 
              Perfumer-Creator for the House of CHANEL.</p>
            <div class="card-price">
              <strong>$149.99</strong>
              <strong>$169.99</strong>
            </div>
            <button class="btn">
              <svg aria-hidden="true" height="14" width="14" xmlns="http://www.w3.org/2000/svg">
            <image height="14" width="14" href="../product-preview-card-component-main/images/icon-cart.svg" />
            </svg>
            <span class="btn-text">Add to Cart</span> </button>
        </div>
  </div>
  </div>

 
  
  <footer class="attribution">
    Challenge by <a href="https://www.frontendmentor.io?ref=challenge">Frontend Mentor</a>. 
    Coded by <a href="#">Your Name Here</a>.
  </footer>
</body>
</html>
